<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SusMode</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <h1>🌱 SusMode</h1>
        <p class="tagline">Sustainable Browser Extension</p>

        <div class="content">
            <h2>Welcome to SusMode!</h2>
            <p>Make your browsing more sustainable. This extension helps you track and reduce your digital carbon
                footprint.</p>

            <div class="metrics">
                <div class="metric-hero">
                    <span class="metric-label">Estimated lifetime energy saved</span>
                    <span class="metric-value" id="metric-energy"></span>
                </div>
                <div class="metric-grid">
                    <div class="metric-card">
                        <span class="metric-label">Scripts blocked</span>
                        <span class="metric-value" id="metric-scripts"></span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Ads blocked</span>
                        <span class="metric-value" id="metric-ads"></span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Videos paused</span>
                        <span class="metric-value" id="metric-videos"></span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">AI mode disabled</span>
                        <span class="metric-value" id="metric-ai-disabled"></span>
                    </div>
                </div>
            </div>

            <div class="toggle-row">
                <span id="toggle-status" class="toggle-status">Enabled</span>
                <button id="toggle-button" class="toggle-button" type="button">Turn off</button>
            </div>

            <div class="feature-toggles">
                <h3>Features</h3>
                <div class="toggle-item">
                    <label for="toggle-ai">Disable AI Search</label>
                    <input type="checkbox" id="toggle-ai" class="toggle-checkbox">
                </div>
                <div class="toggle-item">
                    <label for="toggle-ads">Block Ads</label>
                    <input type="checkbox" id="toggle-ads" class="toggle-checkbox">
                </div>
                <div class="toggle-item">
                    <label for="toggle-scripts">Block Scripts</label>
                    <input type="checkbox" id="toggle-scripts" class="toggle-checkbox">
                </div>
                <div class="toggle-item">
                    <label for="toggle-videos">Pause Videos</label>
                    <input type="checkbox" id="toggle-videos" class="toggle-checkbox">
                </div>
                <div class="toggle-item">
                    <label for="toggle-tab-suspension">Tab Suspension</label>
                    <input type="checkbox" id="toggle-tab-suspension" class="toggle-checkbox">
                </div>
                <div class="toggle-item">
                    <label for="toggle-throttling">Background Throttling</label>
                    <input type="checkbox" id="toggle-throttling" class="toggle-checkbox">
                </div>
            </div>

            <div class="whitelist-section" style="margin-top: 15px; text-align: center;">
                <button id="whitelist-btn" class="toggle-button" style="font-size: 0.9em; padding: 5px 10px;">Whitelist
                    this Site</button>
            </div>
        </div>

        <footer>
            <p>v1.0.0</p>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>

</html>
